kind = "mobile"
previewPath = "/"
title = "Dictée — App iOS pour Enfants"
version = "1.0.0"
id = "artifacts/dictee-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24555

[services.development]
run = "pnpm --filter @workspace/dictee-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dictee-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/dictee-app", "run", "serve" ]

[services.env]
PORT = "24555"
BASE_PATH = "/"
